<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./asset/css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="./asset/js/main.js" defer></script>
    <title>Asistente Nutricional IA</title>
    <link rel="icon" type="image/png" href="./asset/img/dieta-equilibrada.png" />
</head>
<body>
    <main class="app-container">
        <header class="chat__header">
            <img class="header__icon" src="./asset/img/dieta-equilibrada.png" alt="Icono dieta equilibrada" />
            <div class="header__info">
                <h1 class="header__title">NutriBot AI</h1>
                <p class="header__subtitle">Tu nutricionista personal</p>
            </div>
        </header>

        <section class="chat">
            <div class="chat__messages" id="chatbox">
                <div class="chat__message chat__message--bot chat__message--ia">
                    ¡Hola! Soy tu asistente nutricional para crear tu dieta semanal personalizada.
                    ¡Empezamos! <strong> ¿Cuánto pesas (kg)? </strong>
                </div>
            </div>

            <div class="chat__input-group">
                <input type="text" id="inputText" class="chat__input" placeholder="Escribe tu respuesta aquí..." autocomplete="off" />
                <button class="chat__button" id="resButton" aria-label="Enviar mensaje">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </section>
    </main>
</body>
</html>
